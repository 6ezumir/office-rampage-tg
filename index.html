<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Office Rampage</title>
    
    <!-- Phaser -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #1a1a2e;
            overflow: hidden;
            font-family: Arial;
        }
        
        #menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f3460, #1a1a2e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 100;
        }
        
        h1 {
            font-size: 2em;
            margin-bottom: 30px;
        }
        
        .chars {
            display: flex;
            gap: 20px;
            margin: 30px 0;
        }
        
        .char {
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 20px;
            cursor: pointer;
            text-align: center;
            width: 100px;
            border: 2px solid transparent;
        }
        
        .char.selected {
            border-color: yellow;
            background: rgba(255,255,255,0.2);
        }
        
        .char-emoji {
            font-size: 3em;
            margin-bottom: 10px;
        }
        
        button {
            padding: 15px 40px;
            font-size: 1.2em;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin-top: 20px;
        }
        
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #game {
            width: 100vw;
            height: 100vh;
            display: none;
        }
    </style>
</head>
<body>
    <!-- МЕНЮ -->
    <div id="menu">
        <h1>🏢 OFFICE RAMPAGE</h1>
        <h3>ВЫБЕРИ ПЕРСОНАЖА</h3>
        
        <div class="chars">
            <div class="char" onclick="selectChar('boss')">
                <div class="char-emoji">👔</div>
                <div>БОСС</div>
            </div>
            <div class="char" onclick="selectChar('worker')">
                <div class="char-emoji">👨‍💻</div>
                <div>ОФИСНЫЙ</div>
            </div>
            <div class="char" onclick="selectChar('cleaner')">
                <div class="char-emoji">🧹</div>
                <div>УБОРЩИК</div>
            </div>
        </div>
        
        <button onclick="startGame()" id="startBtn" disabled>▶ НАЧАТЬ ИГРУ</button>
    </div>
    
    <!-- ИГРА -->
    <div id="game"></div>

    <script>
        // ========== ПЕРЕМЕННЫЕ ==========
        let selectedChar = null;
        let game = null;
        
        // ========== ФУНКЦИИ МЕНЮ ==========
        window.selectChar = function(char) {
            selectedChar = char;
            
            // Подсветка выбранного
            document.querySelectorAll('.char').forEach(el => {
                el.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            // Активируем кнопку
            document.getElementById('startBtn').disabled = false;
        };
        
        window.startGame = function() {
            if (!selectedChar) return;
            
            // Прячем меню
            document.getElementById('menu').style.display = 'none';
            
            // Показываем контейнер игры
            const gameDiv = document.getElementById('game');
            gameDiv.style.display = 'block';
            
            // Запускаем игру
            startPhaserGame();
        };
        
        // ========== ЗАПУСК PHASER ==========
        function startPhaserGame() {
            console.log('Запуск игры с персонажем:', selectedChar);
            
            // Простейшая конфигурация
            const config = {
                type: Phaser.AUTO,
                width: 800,
                height: 600,
                parent: 'game',
                backgroundColor: '#2c3e50',
                scene: {
                    preload: preload,
                    create: create
                }
            };
            
            // Создаем игру
            game = new Phaser.Game(config);
        }
        
        // ========== СЦЕНЫ ==========
        function preload() {
            console.log('Preload начат');
            
            // Создаем простую графику
            const graphics = this.add.graphics();
            
            // Игрок
            graphics.fillStyle(0x3498db, 1);
            graphics.fillCircle(100, 100, 30);
            graphics.generateTexture('player', 200, 200);
            
            // Предмет
            graphics.clear();
            graphics.fillStyle(0xff6b6b, 1);
            graphics.fillCircle(100, 100, 25);
            graphics.generateTexture('item', 200, 200);
            
            graphics.destroy();
            
            console.log('Preload завершен');
        }
        
        function create() {
            console.log('Create начат');
            
            const scene = this;
            
            // Фон
            scene.add.rectangle(400, 300, 800, 600, 0x34495e);
            
            // Игрок
            scene.player = scene.add.sprite(400, 300, 'player');
            scene.player.setScale(1);
            
            // Предметы
            for(let i = 0; i < 5; i++) {
                const x = 200 + Math.random() * 400;
                const y = 150 + Math.random() * 300;
                scene.add.sprite(x, y, 'item');
            }
            
            // Текст
            scene.add.text(10, 10, 'Очки: 0', { 
                fontSize: '24px', 
                fill: '#fff' 
            });
            
            console.log('Create завершен');
        }
        
        // ========== ВОЗВРАТ В МЕНЮ ==========
        window.returnToMenu = function() {
            if (game) {
                game.destroy(true);
                game = null;
            }
            
            document.getElementById('game').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
        };
    </script>
</body>
</html>
