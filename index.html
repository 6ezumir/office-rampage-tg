<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Office Rampage</title>
    
    <!-- Telegram SDK (ОБЯЗАТЕЛЬНО ПЕРВЫМ) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Phaser -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 1000;
        }
        
        .loading-logo {
            font-size: 5em;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        #main-menu {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f3460, #1a1a2e);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 900;
            padding: 20px;
        }
        
        .game-title {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
            text-align: center;
            background: linear-gradient(45deg, #3498db, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .menu-button {
            width: 80%;
            max-width: 300px;
            padding: 18px;
            margin: 10px 0;
            background: linear-gradient(45deg, #3498db, #2980b9);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
        }
        
        #game-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            display: none;
        }
    </style>
</head>
<body>
    <div id="loading-screen">
        <div class="loading-logo">🏢</div>
        <h1>OFFICE RAMPAGE</h1>
        <p style="margin-top: 20px;">Загрузка...</p>
    </div>
    
    <div id="main-menu" style="display: none;">
        <div class="game-title">OFFICE RAMPAGE</div>
        <p style="margin-bottom: 40px; opacity: 0.7;">Тапай и разрушай!</p>
        
        <button class="menu-button" onclick="startGame()">🎮 НАЧАТЬ ИГРУ</button>
        <button class="menu-button" onclick="showInfo()">📖 КАК ИГРАТЬ</button>
    </div>
    
    <div id="game-container"></div>
    
    <script>
        // Telegram инициализация
        const tg = window.Telegram?.WebApp;
        let playerName = 'Игрок';
        
        if (tg) {
            tg.ready();
            tg.expand();
            playerName = tg.initDataUnsafe?.user?.first_name || 'Игрок';
            console.log('Telegram Mini App запущен, игрок:', playerName);
        }
        
        // Функции меню
        window.startGame = function() {
            document.getElementById('main-menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            // Запускаем игру через 100мс (чтобы DOM обновился)
            setTimeout(() => {
                if (window.initializeGame) {
                    window.initializeGame();
                }
            }, 100);
        };
        
        window.returnToMenu = function() {
            if (window.game) {
                window.game.destroy(true);
                window.game = null;
            }
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        };
        
        window.showInfo = function() {
            alert('🎮 КАК ИГРАТЬ:\n\n' +
                  '👆 Тапни объект - взять/бросить\n' +
                  '👆👆 Двойной тап - ударить\n' +
                  '📍 Тапни по пустому месту - пойти\n\n' +
                  '🏆 Разрушь всё!');
        };
        
        // Скрываем загрузку через 1.5 секунды
        setTimeout(() => {
            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('main-menu').style.display = 'flex';
        }, 1500);
    </script>
    
    <!-- Твой код игры -->
    <script>
        // ==================== ИГРА ====================
        let game;
        let score = 0;
        let stress = 0;
        let draggedObject = null;
        let gameStarted = false;
        
        // Конфиг для мобильных
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            backgroundColor: '#2c3e50',
            scene: {
                preload: preload,
                create: create,
                update: update
            },
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            input: {
                activePointers: 3,
                touch: {
                    capture: true
                }
            }
        };
        
        function preload() {
            console.log('📱 Загрузка...');
            
            // Создаём простые текстуры
            const colors = [
                { key: 'red', color: 0xff6b6b },
                { key: 'blue', color: 0x4ecdc4 },
                { key: 'green', color: 0x1abc9c },
                { key: 'yellow', color: 0xffd166 },
                { key: 'player', color: 0x3498db }
            ];
            
            colors.forEach(item => {
                const g = this.add.graphics();
                g.fillStyle(item.color, 1);
                g.fillCircle(40, 40, 35);
                g.generateTexture(item.key, 80, 80);
                g.destroy();
            });
        }
        
        function create() {
            console.log('✅ Игра создана!');
            gameStarted = true;
            
            const scene = this;
            
            // Игрок (большой круг)
            scene.player = scene.add.sprite(
                config.width / 2,
                config.height / 2,
                'player'
            );
            scene.player.setScale(1.2);
            scene.player.setInteractive();
            
            // Объекты для разрушения
            scene.objects = [];
            const types = ['red', 'blue', 'green', 'yellow'];
            
            for (let i = 0; i < 8; i++) {
                const x = 100 + (i % 4) * (config.width / 4);
                const y = 100 + Math.floor(i / 4) * 200;
                const type = types[i % types.length];
                
                const obj = scene.add.sprite(x, y, type);
                obj.setScale(1);
                obj.setInteractive({ useHandCursor: true });
                obj.setData('health', 100);
                obj.setData('type', type);
                
                scene.objects.push(obj);
            }
            
            // Включаем перетаскивание
            scene.input.setDraggable(scene.objects);
            
            // Обработчики событий
            scene.input.on('dragstart', (pointer, obj) => {
                draggedObject = obj;
                obj.setTint(0x888888);
                obj.setScale(1.2);
            });
            
            scene.input.on('drag', (pointer, obj, x, y) => {
                if (draggedObject === obj) {
                    obj.x = x;
                    obj.y = y;
                }
            });
            
            scene.input.on('dragend', (pointer, obj) => {
                obj.clearTint();
                obj.setScale(1);
                draggedObject = null;
                
                score += 5;
                stress = Math.min(100, stress + 1);
                updateUI(scene);
                
                // Вибрация
                if (tg?.HapticFeedback) {
                    tg.HapticFeedback.impactOccurred('light');
                }
            });
            
            scene.input.on('gameobjectdown', (pointer, obj) => {
                // Двойной тап
                if (pointer.getDuration() < 300) {
                    if (obj !== scene.player) {
                        smashObject(scene, obj);
                    }
                }
            });
            
            // UI
            scene.scoreText = scene.add.text(20, 20, '🏆 0', {
                fontSize: '24px',
                fill: '#f1c40f',
                stroke: '#000',
                strokeThickness: 4
            }).setScrollFactor(0);
            
            scene.stressText = scene.add.text(config.width - 100, 20, '😫 0%', {
                fontSize: '24px',
                fill: '#2ecc71',
                stroke: '#000',
                strokeThickness: 4
            }).setScrollFactor(0);
            
            // Кнопки внизу
            const btnY = config.height - 60;
            const btnW = config.width / 4;
            
            const buttons = [
                { x: btnW * 0.5, text: '👊', color: 0xe74c3c, action: () => smashNearest(scene) },
                { x: btnW * 1.5, text: '☕', color: 0x8B4513, action: () => drinkCoffee(scene) },
                { x: btnW * 2.5, text: '😡', color: 0xf39c12, action: () => rageMode(scene) },
                { x: btnW * 3.5, text: '🔄', color: 0x2ecc71, action: resetGame }
            ];
            
            buttons.forEach(btn => {
                const bg = scene.add.circle(btn.x, btnY, 30, btn.color)
                    .setInteractive({ useHandCursor: true })
                    .setDepth(1000);
                
                scene.add.text(btn.x, btnY, btn.text, {
                    fontSize: '28px'
                }).setOrigin(0.5).setDepth(1001);
                
                bg.on('pointerdown', btn.action);
            });
        }
        
        function update() {
            const scene = this;
            
            // Автоматический рост стресса
            if (gameStarted && Math.random() < 0.01) {
                stress = Math.min(100, stress + 0.5);
                updateUI(scene);
            }
            
            // Проверка на Game Over
            if (stress >= 100 && gameStarted) {
                gameStarted = false;
                alert('😫 ИГРА ОКОНЧЕНА!\nОчков: ' + score);
                resetGame();
            }
        }
        
        function smashObject(scene, obj) {
            const health = obj.getData('health') - 30;
            obj.setData('health', health);
            
            score += 30;
            stress = Math.min(100, stress + 5);
            
            // Анимация
            scene.tweens.add({
                targets: obj,
                scaleX: 1.5,
                scaleY: 0.7,
                duration: 100,
                yoyo: true
            });
            
            if (health <= 0) {
                destroyObject(scene, obj);
            }
            
            updateUI(scene);
            
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('heavy');
            }
        }
        
        function destroyObject(scene, obj) {
            score += 100;
            scene.objects = scene.objects.filter(o => o !== obj);
            
            scene.tweens.add({
                targets: obj,
                scale: 0,
                alpha: 0,
                duration: 300,
                onComplete: () => obj.destroy()
            });
            
            if (scene.objects.length === 0) {
                setTimeout(() => {
                    alert('🏆 ПОБЕДА!\nОчков: ' + score);
                    resetGame();
                }, 500);
            }
        }
        
        function smashNearest(scene) {
            if (scene.objects.length === 0) return;
            
            let nearest = scene.objects[0];
            let minDist = Phaser.Math.Distance.Between(
                scene.player.x, scene.player.y,
                nearest.x, nearest.y
            );
            
            scene.objects.forEach(obj => {
                const dist = Phaser.Math.Distance.Between(
                    scene.player.x, scene.player.y,
                    obj.x, obj.y
                );
                if (dist < minDist) {
                    minDist = dist;
                    nearest = obj;
                }
            });
            
            if (minDist < 300) {
                smashObject(scene, nearest);
            }
        }
        
        function drinkCoffee(scene) {
            stress = Math.max(0, stress - 20);
            updateUI(scene);
            
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('light');
            }
        }
        
        function rageMode(scene) {
            stress = Math.min(100, stress + 30);
            score += 20;
            updateUI(scene);
            
            scene.cameras.main.shake(200, 0.01);
            
            if (tg?.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('heavy');
            }
        }
        
        function updateUI(scene) {
            scene.scoreText.setText('🏆 ' + score);
            
            let stressColor = stress > 70 ? '#e74c3c' : stress > 40 ? '#f39c12' : '#2ecc71';
            scene.stressText.setStyle({ fill: stressColor });
            scene.stressText.setText('😫 ' + Math.round(stress) + '%');
        }
        
        function resetGame() {
            score = 0;
            stress = 0;
            
            if (game) {
                game.destroy(true);
                game = new Phaser.Game(config);
            }
        }
        
        window.initializeGame = function() {
            if (game) {
                game.destroy(true);
            }
            game = new Phaser.Game(config);
            window.game = game;
        };
        
        window.resetGame = resetGame;
        window.playerName = playerName;
    </script>
</body>
</html>
