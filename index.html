<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Office Rampage</title>
    
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Phaser -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: #000; 
            overflow: hidden; 
            touch-action: manipulation;
        }
        #game-container {
            width: 100vw;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
        }
        #loading, #menu {
            position: fixed;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            color: white;
            z-index: 1000;
        }
        #menu { display: none; }
        button {
            padding: 15px 30px;
            margin: 10px;
            font-size: 1.2em;
            border: none;
            border-radius: 10px;
            background: #3498db;
            color: white;
            cursor: pointer;
        }
        .character-select {
            display: flex;
            gap: 20px;
            margin: 30px 0;
        }
        .character {
            padding: 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            cursor: pointer;
            text-align: center;
        }
        .character.selected {
            border: 3px solid #f1c40f;
            transform: scale(1.1);
        }
    </style>
</head>
<body>
    <div id="loading">
        <h1>🏢 OFFICE RAMPAGE</h1>
        <p>Загрузка игры...</p>
    </div>
    
    <div id="menu">
        <h1>ВЫБЕРИ ПЕРСОНАЖА</h1>
        <div class="character-select">
            <div class="character" data-character="boss" onclick="selectCharacter('boss')">
                <div>👔</div>
                <div>БОСС</div>
                <small>Сильный удар</small>
            </div>
            <div class="character" data-character="worker" onclick="selectCharacter('worker')">
                <div>👨‍💻</div>
                <div>ОФИСНЫЙ</div>
                <small>Быстрый</small>
            </div>
            <div class="character" data-character="cleaner" onclick="selectCharacter('cleaner')">
                <div>🧹</div>
                <div>УБОРЩИК</div>
                <small>Восстановление</small>
            </div>
        </div>
        <button onclick="startGame()" id="start-btn" disabled>НАЧАТЬ ИГРУ</button>
    </div>
    
    <div id="game-container"></div>
    
    <script>
        // Telegram инициализация
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
            tg.MainButton.setText('ПОДЕЛИТЬСЯ');
            tg.MainButton.hide();
        }
        
        // Переменные
        let selectedCharacter = null;
        window.playerName = tg?.initDataUnsafe?.user?.first_name || 'Игрок';
        
        // Функции меню
        window.selectCharacter = function(character) {
            selectedCharacter = character;
            document.querySelectorAll('.character').forEach(c => {
                c.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            document.getElementById('start-btn').disabled = false;
        };
        
        window.startGame = function() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game-container').style.display = 'block';
            
            if (window.game) {
                window.game.destroy(true);
            }
            
            // Передаём выбранного персонажа в игру
            window.selectedCharacter = selectedCharacter;
            window.initializeGame();
        };
        
        window.returnToMenu = function() {
            if (window.game) {
                window.game.destroy(true);
            }
            document.getElementById('game-container').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
        };
        
        // Скрываем загрузку
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
        }, 1500);
    </script>
    
    <!-- Игра -->
    <script src="game.js"></script>
</body>
</html>
