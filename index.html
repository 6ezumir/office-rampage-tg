<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Office Rampage</title>
    
    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Phaser -->
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <style>
        /* ========== СТИЛИ ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            background: #1a1a2e;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        
        #loading, #menu, #game {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        #loading {
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            z-index: 2000;
        }
        
        #menu {
            background: linear-gradient(135deg, #0f3460, #1a1a2e);
            display: none;
            z-index: 1500;
            padding: 20px;
            overflow-y: auto;
        }
        
        #game {
            display: none;
            z-index: 1000;
        }
        
        h1 { font-size: 2.5em; margin-bottom: 20px; }
        
        .loading-logo {
            font-size: 5em;
            margin-bottom: 20px;
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        .chars {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px;
            max-width: 800px;
            margin: 30px 0;
        }
        
        .char {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            text-align: center;
            border: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .char:hover { transform: translateY(-5px); background: rgba(255,255,255,0.15); }
        .char.selected { border-color: #f1c40f; background: rgba(255,255,255,0.2); }
        
        .char-emoji { font-size: 3em; margin-bottom: 10px; }
        .char-name { font-weight: bold; margin-bottom: 5px; }
        
        button {
            padding: 15px 40px;
            font-size: 1.2em;
            background: #3498db;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            margin: 10px;
        }
        
        button:disabled { opacity: 0.5; cursor: not-allowed; }
    </style>
</head>
<body>
    <!-- ЗАГРУЗКА -->
    <div id="loading">
        <div class="loading-logo">🏢</div>
        <h1>OFFICE RAMPAGE</h1>
        <p>Загрузка...</p>
    </div>
    
    <!-- МЕНЮ -->
    <div id="menu">
        <h1>ВЫБЕРИ ПЕРСОНАЖА</h1>
        
        <div class="chars">
            <div class="char" onclick="selectChar('boss')">
                <div class="char-emoji">👔</div>
                <div class="char-name">БОСС</div>
            </div>
            <div class="char" onclick="selectChar('worker')">
                <div class="char-emoji">👨‍💻</div>
                <div class="char-name">ОФИСНЫЙ</div>
            </div>
            <div class="char" onclick="selectChar('cleaner')">
                <div class="char-emoji">🧹</div>
                <div class="char-name">УБОРЩИК</div>
            </div>
        </div>
        
        <button onclick="startGame()" id="startBtn" disabled>🎮 НАЧАТЬ ИГРУ</button>
    </div>
    
    <!-- ИГРА -->
    <div id="game"></div>

    <!-- ========== ВЕСЬ JAVASCRIPT КОД ЗДЕСЬ ========== -->
    <script>
        // ==================== TELEGRAM ====================
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }
        
        // ==================== ПЕРЕМЕННЫЕ ====================
        let selectedChar = null;
        let game = null;
        let score = 0;
        let stress = 0;
        
        // ==================== ДАННЫЕ ПЕРСОНАЖЕЙ ====================
        const characters = {
            boss: { name: 'БОСС', color: 0xc0392b, speed: 150, damage: 50 },
            worker: { name: 'ОФИСНЫЙ', color: 0x3498db, speed: 200, damage: 30 },
            cleaner: { name: 'УБОРЩИК', color: 0x27ae60, speed: 180, damage: 25 }
        };
        
        // ==================== ДАННЫЕ ЛОКАЦИЙ ====================
        const locations = {
            office: {
                name: '🏢 ОФИС',
                color: 0x2c3e50,
                objects: [
                    { type: 'printer', x: 200, y: 200, health: 100, color: 0xff6b6b },
                    { type: 'computer', x: 400, y: 150, health: 80, color: 0x4ecdc4 },
                    { type: 'chair', x: 300, y: 300, health: 50, color: 0x1abc9c }
                ]
            }
        };
        
        let currentLocation = 'office';
        let playerStats = {};
        
        // ==================== ФУНКЦИИ МЕНЮ ====================
        window.selectChar = function(char) {
            selectedChar = char;
            playerStats = characters[char];
            
            document.querySelectorAll('.char').forEach(el => {
                el.classList.remove('selected');
            });
            event.currentTarget.classList.add('selected');
            
            document.getElementById('startBtn').disabled = false;
        };
        
        window.startGame = function() {
            if (!selectedChar) return;
            
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            document.getElementById('game').innerHTML = '';
            
            initGame();
        };
        
        // ==================== ИНИЦИАЛИЗАЦИЯ ИГРЫ ====================
        function initGame() {
            const config = {
                type: Phaser.AUTO,
                width: window.innerWidth,
                height: window.innerHeight,
                parent: 'game',
                backgroundColor: locations[currentLocation].color,
                scene: { preload, create, update },
                scale: { mode: Phaser.Scale.FIT, autoCenter: Phaser.Scale.CENTER_BOTH }
            };
            
            game = new Phaser.Game(config);
        }
        
        // ==================== СЦЕНЫ PHASER ====================
        function preload() {
            const scene = this;
            const location = locations[currentLocation];
            
            // Текстура пола
            const floorTex = scene.add.graphics();
            floorTex.fillStyle(location.color, 1);
            floorTex.fillRect(0, 0, 64, 64);
            floorTex.generateTexture('floor', 64, 64);
            floorTex.destroy();
            
            // Текстура игрока
            const playerTex = scene.add.graphics();
            playerTex.fillStyle(playerStats.color, 1);
            playerTex.fillCircle(40, 40, 35);
            playerTex.fillStyle(0xffffff, 1);
            playerTex.fillCircle(30, 30, 8);
            playerTex.fillCircle(50, 30, 8);
            playerTex.generateTexture('player', 80, 80);
            playerTex.destroy();
            
            // Текстуры предметов
            location.objects.forEach((obj, index) => {
                const tex = scene.add.graphics();
                tex.fillStyle(obj.color, 1);
                tex.fillCircle(40, 40, 30);
                tex.generateTexture(`item_${index}`, 80, 80);
                tex.destroy();
            });
        }
        
        function create() {
            const scene = this;
            const location = locations[currentLocation];
            const width = window.innerWidth;
            const height = window.innerHeight;
            
            // Пол
            scene.add.tileSprite(0, 0, width, height, 'floor')
                .setOrigin(0)
                .setTileScale(2);
            
            // Игрок
            scene.player = scene.add.sprite(300, 300, 'player');
            scene.player.setScale(1.2);
            
            // Предметы
            scene.objects = [];
            location.objects.forEach((obj, index) => {
                const item = scene.add.sprite(obj.x, obj.y, `item_${index}`);
                item.setInteractive();
                item.setData('health', obj.health);
                item.setData('type', obj.type);
                scene.objects.push(item);
            });
            
            // UI
            scene.scoreText = scene.add.text(20, 20, '💰 0', {
                fontSize: '24px',
                fill: '#f1c40f',
                stroke: '#000',
                strokeThickness: 4
            }).setScrollFactor(0);
            
            scene.stressText = scene.add.text(width - 120, 20, '😫 0%', {
                fontSize: '24px',
                fill: '#2ecc71',
                stroke: '#000',
                strokeThickness: 4
            }).setScrollFactor(0);
            
            // Управление
            scene.input.on('pointerdown', (pointer) => {
                const target = pointer.targetObject;
                
                if (!target) {
                    // Движение
                    scene.tweens.add({
                        targets: scene.player,
                        x: pointer.x,
                        y: pointer.y,
                        duration: 1000
                    });
                }
            });
            
            scene.input.on('gameobjectdown', (pointer, obj) => {
                // Атака предмета
                const health = obj.getData('health') - playerStats.damage;
                obj.setData('health', health);
                
                scene.tweens.add({
                    targets: obj,
                    scaleX: 1.5,
                    scaleY: 0.7,
                    duration: 100,
                    yoyo: true
                });
                
                if (health <= 0) {
                    score += 50;
                    obj.destroy();
                }
                
                stress = Math.min(100, stress + 2);
                updateUI(scene);
            });
        }
        
        function update() {
            const scene = this;
            
            if (Math.random() < 0.01) {
                stress = Math.min(100, stress + 0.5);
                updateUI(scene);
            }
        }
        
        function updateUI(scene) {
            scene.scoreText.setText('💰 ' + score);
            
            let color = stress > 70 ? '#e74c3c' : stress > 40 ? '#f39c12' : '#2ecc71';
            scene.stressText.setStyle({ fill: color });
            scene.stressText.setText('😫 ' + Math.floor(stress) + '%');
        }
        
        // ==================== ЗАПУСК ====================
        window.onload = function() {
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('menu').style.display = 'flex';
            }, 1500);
        };
    </script>
</body>
</html>
