<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Office Rampage</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #1a1a2e; overflow: hidden; }
        #game-container { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <script>
        // ==================== ТВОЙ ОРИГИНАЛЬНЫЙ КОД ====================
        let game;
        let score = 0;
        let stress = 0;
        let draggedObject = null;
        let tapTimer = 0;
        let gameStarted = false;

        // Telegram
        const tg = window.Telegram?.WebApp;
        if (tg) {
            tg.ready();
            tg.expand();
        }

        // Конфигурация
        const config = {
            type: Phaser.AUTO,
            width: window.innerWidth,
            height: window.innerHeight,
            parent: 'game-container',
            backgroundColor: '#2c3e50',
            scene: {
                preload: preload,
                create: create,
                update: update
            },
            scale: {
                mode: Phaser.Scale.FIT,
                autoCenter: Phaser.Scale.CENTER_BOTH
            },
            input: {
                activePointers: 3
            }
        };

        function preload() {
            console.log('📱 Загрузка...');
            
            const colors = [
                { key: 'red', color: 0xff6b6b },
                { key: 'blue', color: 0x4ecdc4 },
                { key: 'green', color: 0x1abc9c },
                { key: 'yellow', color: 0xffd166 },
                { key: 'player', color: 0x3498db }
            ];
            
            colors.forEach(item => {
                const g = this.add.graphics();
                
                if (item.key === 'player') {
                    g.fillStyle(item.color, 1);
                    g.fillCircle(40, 40, 35);
                    g.fillStyle(0xffffff, 1);
                    g.fillCircle(30, 30, 8);
                    g.fillCircle(50, 30, 8);
                } else {
                    g.fillStyle(item.color, 1);
                    g.fillCircle(40, 40, 35);
                }
                
                g.generateTexture(item.key, 80, 80);
                g.destroy();
            });
        }

        function create() {
            gameStarted = true;
            const scene = this;
            
            // Игрок
            scene.player = scene.add.sprite(200, 300, 'player');
            scene.player.setScale(1);
            scene.player.setInteractive();
            
            // Объекты
            scene.objects = [];
            const types = ['red', 'blue', 'green', 'yellow'];
            
            for(let i = 0; i < 8; i++) {
                const x = 100 + (i % 4) * 150;
                const y = 100 + Math.floor(i / 4) * 150;
                const type = types[i % 4];
                
                const obj = scene.add.sprite(x, y, type);
                obj.setInteractive();
                obj.setData('health', 100);
                obj.setData('points', 50);
                obj.setData('type', type);
                scene.objects.push(obj);
            }
            
            // Включаем перетаскивание
            scene.input.setDraggable(scene.objects);
            
            // Drag events
            scene.input.on('dragstart', (pointer, obj) => {
                draggedObject = obj;
                obj.setTint(0x888888);
            });
            
            scene.input.on('drag', (pointer, obj, x, y) => {
                if(draggedObject === obj) {
                    obj.x = x;
                    obj.y = y;
                }
            });
            
            scene.input.on('dragend', (pointer, obj) => {
                obj.clearTint();
                draggedObject = null;
                score += 5;
                stress = Math.min(100, stress + 1);
                updateUI(scene);
            });
            
            // Double tap
            scene.input.on('pointerdown', (pointer) => {
                const now = Date.now();
                const target = pointer.targetObject;
                
                if(now - tapTimer < 300 && target && target !== scene.player) {
                    smashObject(scene, target);
                    tapTimer = 0;
                } else {
                    tapTimer = now;
                }
            });
            
            // UI
            scene.scoreText = scene.add.text(10, 10, '🏆 0', {
                fontSize: '24px',
                fill: '#f1c40f'
            }).setScrollFactor(0);
            
            scene.stressText = scene.add.text(10, 40, '😫 0%', {
                fontSize: '24px',
                fill: '#2ecc71'
            }).setScrollFactor(0);
        }

        function update() {
            const scene = this;
            
            if(Math.random() < 0.01) {
                stress = Math.min(100, stress + 0.5);
                updateUI(scene);
            }
        }

        function smashObject(scene, obj) {
            const health = obj.getData('health') - 30;
            obj.setData('health', health);
            
            score += 30;
            stress = Math.min(100, stress + 2);
            
            scene.tweens.add({
                targets: obj,
                scaleX: 1.3,
                scaleY: 0.7,
                duration: 100,
                yoyo: true
            });
            
            if(health <= 0) {
                score += obj.getData('points');
                scene.objects = scene.objects.filter(o => o !== obj);
                obj.destroy();
            }
            
            updateUI(scene);
        }

        function updateUI(scene) {
            scene.scoreText.setText('🏆 ' + score);
            scene.stressText.setText('😫 ' + Math.round(stress) + '%');
        }

        // Запуск
        window.onload = () => {
            game = new Phaser.Game(config);
        };
    </script>
</body>
</html>
